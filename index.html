<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Himalayan Retreat</title>
    <meta name="description" content="Your guide to the Himalayan retreat experience" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Retreat" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#0A0A0B" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Recovery: if app doesn't render in 5s, clear SW caches and reload
      setTimeout(function() {
        var root = document.getElementById("root");
        if (root && root.children.length === 0 && "caches" in window) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
          caches.keys().then(function(names) {
            Promise.all(names.map(function(n) { return caches.delete(n); })).then(function() {
              if (!sessionStorage.getItem("sw-fix")) {
                sessionStorage.setItem("sw-fix", "1");
                window.location.reload();
              }
            });
          });
        }
      }, 5000);
    </script>
  </body>
</html>
